name: KMP Manual Release
run-name: KMP Manual Release v${{ inputs.version_name }}

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      publish_github:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: true
      publish_googleplay:
        description: 'Publish to Google Play (Internal track draft)'
        type: boolean
        default: false
      publish_rustore:
        description: 'Publish to RuStore (Draft)'
        type: boolean
        default: false
      publish_macos_app_store:
        description: 'Publish macOS to Apple App Store'
        type: boolean
        default: false
      publish_ios_app_store:
        description: 'Publish iOS to Apple App Store'
        type: boolean
        default: false
      publish_macos:
        description: 'Build macOS version'
        type: boolean
        default: true

jobs:
  build_android:
    name: Build Android (APK/AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            echo $ENCODED_STRING | base64 -d > release.keystore
          else
            echo "KEYSTORE_BASE64 is empty, skipping keystore decode"
          fi

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p composeApp
            echo $GOOGLE_SERVICES_JSON | base64 -d > composeApp/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON is empty, skipping"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK and AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: warn
          path: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab

  build_windows:
    name: Build Windows (MSI/EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if ($env:GOOGLE_SERVICES_JSON) {
            if (-not (Test-Path "composeApp")) { New-Item -ItemType Directory -Path "composeApp" }
            $bytes = [Convert]::FromBase64String($env:GOOGLE_SERVICES_JSON)
            [IO.File]::WriteAllBytes("composeApp\google-services.json", $bytes)
          }

      - name: Build MSI
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :composeApp:packageMsi

      - name: Build App Image for MSIX
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :composeApp:createDistributable

      - name: Package MSIX
        shell: pwsh
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          MS_STORE_IDENTITY_NAME: ${{ secrets.MS_STORE_IDENTITY_NAME }}
          MS_STORE_PUBLISHER: ${{ secrets.MS_STORE_PUBLISHER }}
          MS_STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.MS_STORE_PUBLISHER_DISPLAY_NAME }}
        run: |
          $appDir = "composeApp/build/compose/binaries/main/app/SMSNode"
          if (-not (Test-Path $appDir)) { Write-Error "App dir not found"; exit 1 }

          $versionName = $env:APP_VERSION_NAME
          $versionParts = $versionName.Split('.')
          $outParts = @()
          for ($i=0; $i -lt 4; $i++) {
            if ($i -lt $versionParts.Length) { $outParts += $versionParts[$i] } else { $outParts += "0" }
          }
          $appxVersion = $outParts -join "."

          $identityName = if ($env:MS_STORE_IDENTITY_NAME) { $env:MS_STORE_IDENTITY_NAME } else { "SMSNode" }
          $publisher = if ($env:MS_STORE_PUBLISHER) { $env:MS_STORE_PUBLISHER } else { "CN=Vasilii" }
          $pubDisplayName = if ($env:MS_STORE_PUBLISHER_DISPLAY_NAME) { $env:MS_STORE_PUBLISHER_DISPLAY_NAME } else { "Vasmarfas" }

          $manifest = @"
          <?xml version=`"1.0`" encoding=`"utf-8`"?>
          <Package xmlns=`"http://schemas.microsoft.com/appx/manifest/foundation/windows10`"
                   xmlns:uap=`"http://schemas.microsoft.com/appx/manifest/uap/windows10`"
                   xmlns:rescap=`"http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities`"
                   IgnorableNamespaces=`"uap rescap`">
            <Identity Name=`"$identityName`" Publisher=`"$publisher`" Version=`"$appxVersion`" ProcessorArchitecture=`"x64`" />
            <Properties>
              <DisplayName>SMSNode</DisplayName>
              <PublisherDisplayName>$pubDisplayName</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Resources>
              <Resource Language=`"en-US`" />
            </Resources>
            <Dependencies>
              <TargetDeviceFamily Name=`"Windows.Desktop`" MinVersion=`"10.0.17763.0`" MaxVersionTested=`"10.0.22621.0`" />
            </Dependencies>
            <Capabilities>
              <rescap:Capability Name=`"runFullTrust`" />
            </Capabilities>
            <Applications>
              <Application Id=`"SMSNode`" Executable=`"SMSNode.exe`" EntryPoint=`"Windows.FullTrustApplication`">
                <uap:VisualElements DisplayName=`"SMSNode`" Description=`"SMSNode Application`" BackgroundColor=`"transparent`"
                                    Square150x150Logo=`"Assets\Square150x150Logo.png`" Square44x44Logo=`"Assets\Square44x44Logo.png`">
                  <uap:DefaultTile Wide310x150Logo=`"Assets\Wide310x150Logo.png`" />
                </uap:VisualElements>
              </Application>
            </Applications>
          </Package>
          "@
          Set-Content -Path "$appDir\AppxManifest.xml" -Value $manifest -Encoding UTF8

          New-Item -ItemType Directory -Force -Path "$appDir\Assets" | Out-Null
          
          Add-Type -AssemblyName System.Drawing
          $img = [System.Drawing.Image]::FromFile("$PWD\composeApp\icons\logo.png")
          
          function Resize-Image($src, $w, $h, $dest) {
             $bmp = New-Object System.Drawing.Bitmap($w, $h)
             $g = [System.Drawing.Graphics]::FromImage($bmp)
             $g.DrawImage($src, 0, 0, $w, $h)
             $g.Dispose()
             $bmp.Save($dest, [System.Drawing.Imaging.ImageFormat]::Png)
             $bmp.Dispose()
          }
          Resize-Image $img 50 50 "$appDir\Assets\StoreLogo.png"
          Resize-Image $img 150 150 "$appDir\Assets\Square150x150Logo.png"
          Resize-Image $img 44 44 "$appDir\Assets\Square44x44Logo.png"
          Resize-Image $img 310 150 "$appDir\Assets\Wide310x150Logo.png"
          $img.Dispose()

          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1
          if (-not $makeappx) { Write-Error "makeappx.exe not found"; exit 1 }

          New-Item -ItemType Directory -Force -Path "composeApp/build/compose/binaries/main/msix" | Out-Null
          $msixOut = "$PWD\composeApp\build\compose\binaries\main\msix\SMSNode-$versionName.msix"
          & $makeappx.FullName pack /d $appDir /p $msixOut /o

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: warn
          path: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/msix/*.msix

  build_linux:
    name: Build Linux (DEB/RPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p composeApp
            echo $GOOGLE_SERVICES_JSON | base64 -d > composeApp/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Linux Deb/Rpm
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :composeApp:packageDeb :composeApp:packageRpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: warn
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm

  build_macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    if: ${{ inputs.publish_macos == true }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p composeApp
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Import Apple Developer ID Certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > dev_id.p12
            security create-keychain -p "" build.keychain
            security import dev_id.p12 -k build.keychain -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
            security list-keychains -d user -s build.keychain
            security unlock-keychain -p "" build.keychain
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          fi

      - name: Build macOS DMG
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./gradlew :composeApp:packageDmg

      - name: Import App Store Certificates for PKG
        if: ${{ inputs.publish_macos_app_store == true }}
        env:
          MAC_APP_DIST_P12_BASE64: ${{ secrets.MAC_APP_DIST_P12_BASE64 }}
          MAC_APP_DIST_P12_PASSWORD: ${{ secrets.MAC_APP_DIST_P12_PASSWORD }}
          MAC_INSTALLER_DIST_P12_BASE64: ${{ secrets.MAC_INSTALLER_DIST_P12_BASE64 }}
          MAC_INSTALLER_DIST_P12_PASSWORD: ${{ secrets.MAC_INSTALLER_DIST_P12_PASSWORD }}
        run: |
          if [ -n "$MAC_APP_DIST_P12_BASE64" ]; then
            echo "$MAC_APP_DIST_P12_BASE64" | base64 --decode > app.p12
            security import app.p12 -k build.keychain -P "$MAC_APP_DIST_P12_PASSWORD" -T /usr/bin/codesign
          fi
          if [ -n "$MAC_INSTALLER_DIST_P12_BASE64" ]; then
            echo "$MAC_INSTALLER_DIST_P12_BASE64" | base64 --decode > inst.p12
            security import inst.p12 -k build.keychain -P "$MAC_INSTALLER_DIST_P12_PASSWORD" -T /usr/bin/productsign
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Build macOS PKG for App Store
        if: ${{ inputs.publish_macos_app_store == true }}
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.MAC_APP_DIST_IDENTITY }}
        run: |
          echo "Listing certificates in keychain:"
          security find-identity -v -p codesigning build.keychain
          
          ./gradlew :composeApp:packagePkg -PmacOsAppStoreRelease=true || {
            echo "Build failed. Printing jpackage output log..."
            cat $(find composeApp/build/compose/logs/packagePkg -name "*out.txt" | head -1)
            echo "Printing jpackage error log..."
            cat $(find composeApp/build/compose/logs/packagePkg -name "*err.txt" | head -1)
            exit 1
          }

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: warn
          path: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/pkg/*.pkg

  build_ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install Apple Certificate and Provisioning Profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            # Create variables
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

            # Import certificate and provisioning profile from secrets
            echo -n "$IOS_P12_BASE64" | base64 --decode --output $CERTIFICATE_PATH
            echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode --output $PP_PATH

            # Create temporary keychain
            security create-keychain -p "" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "" $KEYCHAIN_PATH

            # Import certificate to keychain
            security import $CERTIFICATE_PATH -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH

            # Apply provisioning profile
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          fi

      - name: Build and Archive iOS App
        run: |
          cd iosApp
          xcodebuild -scheme iosApp \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="SMSNode AppStore Profile" \
            PRODUCT_BUNDLE_IDENTIFIER="com.vasmarfas.smsnode" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            MARKETING_VERSION="${{ inputs.version_name }}" \
            ARCHS="arm64"

      - name: Export IPA
        run: |
          # Note: An ExportOptions.plist is normally required here. 
          # For a basic manual release, we can upload the archive or assume a simple export.
          # To keep it robust, we'll try a basic export if a plist exists, otherwise upload the archive.
          if [ -f "iosApp/ExportOptions.plist" ]; then
            xcodebuild -exportArchive \
              -archivePath $RUNNER_TEMP/iosApp.xcarchive \
              -exportOptionsPlist iosApp/ExportOptions.plist \
              -exportPath $RUNNER_TEMP/export
          else
            echo "ExportOptions.plist not found, uploading archive instead."
            mkdir -p $RUNNER_TEMP/export
            cp -r $RUNNER_TEMP/iosApp.xcarchive $RUNNER_TEMP/export/
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          if-no-files-found: warn
          path: ${{ runner.temp }}/export/

  build_wasm:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build WASM
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          if-no-files-found: warn
          path: composeApp/build/dist/wasmJs/productionExecutable/

  github_release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build_android, build_windows, build_linux, build_macos, build_wasm, build_ios]
    if: ${{ always() && inputs.publish_github == true }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
        continue-on-error: true

      - name: List artifacts (debug)
        run: ls -R all-artifacts || echo "No artifacts found"

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version_name }}
          name: Release ${{ inputs.version_name }}
          draft: true
          generate_release_notes: true
          files: |
            all-artifacts/android-release/*
            all-artifacts/windows-release/*
            all-artifacts/linux-release/*
            all-artifacts/macos-release/*
            all-artifacts/wasm-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_google_play:
    name: Publish to Google Play
    runs-on: ubuntu-latest
    needs: build_android
    if: ${{ inputs.publish_googleplay == true }}
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist

      - name: Find AAB
        id: find_aab
        run: |
          AAB_FILE=$(find dist -name "*.aab" | head -n 1)
          if [ -z "$AAB_FILE" ]; then
            echo "No AAB found!"
            exit 1
          fi
          echo "aab_path=$AAB_FILE" >> $GITHUB_OUTPUT

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME }}
          releaseFiles: ${{ steps.find_aab.outputs.aab_path }}
          track: internal
          status: draft

  publish_rustore:
    name: Publish to RuStore
    runs-on: ubuntu-latest
    needs: build_android
    if: ${{ inputs.publish_rustore == true }}
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist
          
      - name: Find APK
        id: find_apk
        run: |
          # Предпочитаем release APK
          APK_FILE=$(find dist -name "*release*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find dist -name "*.apk" | head -n 1)
          fi
          
          if [ -z "$APK_FILE" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "Found APK: $APK_FILE"
          echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Publish to RuStore
        env:
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          PACKAGE_NAME: ${{ secrets.RUSTORE_PACKAGE_NAME }}
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
        run: |
          if [ -z "$RUSTORE_KEY_ID" ] || [ -z "$RUSTORE_PRIVATE_KEY" ]; then
            echo "RuStore secrets (KEY_ID or PRIVATE_KEY) are missing!"
            exit 1
          fi
          
          python -m pip install --upgrade pip
          python -m pip install pycryptodome requests requests-toolbelt
          
          python - << 'EOF'
          import os, base64, datetime, json, sys, requests
          from Crypto.PublicKey import RSA
          from Crypto.Signature import pkcs1_15
          from Crypto.Hash import SHA512
          from requests_toolbelt.multipart.encoder import MultipartEncoder
          
          key_id = os.getenv("RUSTORE_KEY_ID")
          private_key_b64 = os.getenv("RUSTORE_PRIVATE_KEY")
          pkg_name = os.getenv("PACKAGE_NAME")
          version_name = os.getenv("APP_VERSION_NAME")
          apk_path = os.getenv("APK_PATH")
          
          # 1. Получение JWE токена
          try:
              private_key = RSA.import_key(base64.b64decode(private_key_b64))
              timestamp = datetime.datetime.now(datetime.timezone.utc).isoformat(timespec='milliseconds')
              message = key_id + timestamp
              
              h = SHA512.new(message.encode())
              signer = pkcs1_15.new(private_key)
              signature = base64.b64encode(signer.sign(h)).decode()
              
              auth_resp = requests.post(
                  "https://public-api.rustore.ru/public/auth",
                  json={"keyId": key_id, "timestamp": timestamp, "signature": signature},
                  timeout=30
              )
              auth_data = auth_resp.json()
              if auth_data.get("code") != "OK":
                  print(f"RuStore Auth Failed: {auth_data}")
                  sys.exit(1)
              
              jwe = auth_data['body']['jwe']
              print("RuStore Authentication Successful")
          except Exception as e:
              print(f"Error during RuStore Auth: {e}")
              sys.exit(1)
              
          # 2. Создание версии (Draft)
          headers = {"Public-Token": jwe}
          url_base = f"https://public-api.rustore.ru/public/v1/application/{pkg_name}/version"
          
          try:
              print(f"Creating new draft version {version_name}...")
              create_resp = requests.post(
                  url_base,
                  headers=headers,
                  json={"publishType": "MANUAL"},
                  timeout=30
              )
              create_data = create_resp.json()
              
              version_id = None
              code = create_data.get("code")
              message = create_data.get("message", "")
              
              if code == "OK":
                  version_id = create_data["body"]
                  print(f"New draft created versionId: {version_id}")
              elif code == "ERROR" and "You already have draft version with ID =" in message:
                  import re
                  match = re.search(r"ID = (\d+)", message)
                  if match:
                      version_id = int(match.group(1))
                      print(f"Reusing existing draft versionId: {version_id}")
                      
              if not version_id:
                  print(f"Failed to create RuStore draft: {create_data}")
                  print("NOTE: If this is the first time you are publishing the app, you MUST create the first draft manually in the RuStore Console.")
                  sys.exit(1)
          except Exception as e:
              print(f"Error creating/checking RuStore draft: {e}")
              sys.exit(1)
          
          # 3. Загрузка APK
          try:
              print(f"Uploading APK: {os.path.basename(apk_path)}...")
              with open(apk_path, "rb") as f:
                  m = MultipartEncoder(fields={
                      'file': (os.path.basename(apk_path), f, 'application/vnd.android.package-archive')
                  })
                  upload_headers = headers.copy()
                  upload_headers["Content-Type"] = m.content_type
                  
                  upload_resp = requests.post(
                      f"{url_base}/{version_id}/apk?isMainApk=true",
                      headers=upload_headers,
                      data=m,
                      timeout=300
                  )
                  upload_data = upload_resp.json()
                  if upload_data.get("code") != "OK":
                      print(f"APK Upload Failed: {upload_data}")
                      sys.exit(1)
                  print("APK uploaded successfully to RuStore")
          except Exception as e:
              print(f"Error uploading APK to RuStore: {e}")
              sys.exit(1)
              
          print("RuStore publication (Draft) completed successfully!")
          EOF

  publish_to_app_stores:
    name: Publish to App Store
    runs-on: macos-latest
    needs: [build_macos, build_ios]
    if: ${{ always() && (inputs.publish_macos_app_store == true || inputs.publish_ios_app_store == true) }}
    steps:
      - name: Setup latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download macOS Artifacts
        if: ${{ inputs.publish_macos_app_store == true }}
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist-macos
        continue-on-error: true
      - name: Download iOS Artifacts
        if: ${{ inputs.publish_ios_app_store == true }}
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: dist-ios
        continue-on-error: true
      
      - name: Upload macOS PKG to App Store Connect
        if: ${{ inputs.publish_macos_app_store == true }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          PKG_FILE=$(find dist-macos -name "*.pkg" | head -n 1)
          if [ -n "$PKG_FILE" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Uploading $PKG_FILE to App Store Connect..."
            xcrun altool --upload-app -f "$PKG_FILE" -t macos -u "$APPLE_ID" -p "@env:APPLE_APP_SPECIFIC_PASSWORD" || echo "Failed to upload macOS app"
          else
            echo "No macOS PKG found or no password provided! Skipping macOS upload."
          fi
          
      - name: Upload iOS IPA to App Store Connect
        if: ${{ inputs.publish_ios_app_store == true }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_FILE=$(find dist-ios -name "*.ipa" | head -n 1)
          if [ -n "$IPA_FILE" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Uploading $IPA_FILE to App Store Connect..."
            xcrun altool --upload-app -f "$IPA_FILE" -t ios -u "$APPLE_ID" -p "@env:APPLE_APP_SPECIFIC_PASSWORD" || echo "Failed to upload iOS app"
          else
            echo "No iOS IPA found or no password provided! Skipping iOS upload."
          fi
