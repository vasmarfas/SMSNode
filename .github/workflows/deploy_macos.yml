name: Deploy macOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      publish_app_store:
        description: 'Publish PKG to Apple App Store'
        type: boolean
        default: false

jobs:
  build_macos:
    name: Build macOS (DMG/PKG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Import Apple Developer ID Certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID_P12_BASE64" ]; then
            echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > dev_id.p12
            security create-keychain -p "" build.keychain
            security import dev_id.p12 -k build.keychain -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
            security list-keychains -d user -s build.keychain
            security unlock-keychain -p "" build.keychain
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          fi

      - name: Build and Notarize macOS DMG
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Собираем DMG для прямой раздачи
          ./gradlew :composeApp:packageDmg
          
          # Отправка DMG на нотаризацию в Apple
          DMG_FILE=$(find composeApp/build/compose/binaries/main/dmg -name "*.dmg" | head -n 1)
          if [ -n "$DMG_FILE" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_ID_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Notarizing $DMG_FILE..."
            xcrun notarytool submit "$DMG_FILE" --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            echo "Stapling ticket to $DMG_FILE..."
            xcrun stapler staple "$DMG_FILE"
          else
            echo "Notarization skipped: Missing Apple credentials or DMG file."
          fi

      - name: Import App Store Certificates for PKG
        if: ${{ inputs.publish_app_store == true }}
        env:
          MAC_APP_DIST_P12_BASE64: ${{ secrets.MAC_APP_DIST_P12_BASE64 }}
          MAC_APP_DIST_P12_PASSWORD: ${{ secrets.MAC_APP_DIST_P12_PASSWORD }}
          MAC_INSTALLER_DIST_P12_BASE64: ${{ secrets.MAC_INSTALLER_DIST_P12_BASE64 }}
          MAC_INSTALLER_DIST_P12_PASSWORD: ${{ secrets.MAC_INSTALLER_DIST_P12_PASSWORD }}
        run: |
          if [ -n "$MAC_APP_DIST_P12_BASE64" ]; then
            echo "$MAC_APP_DIST_P12_BASE64" | base64 --decode > app.p12
            security import app.p12 -k build.keychain -P "$MAC_APP_DIST_P12_PASSWORD" -T /usr/bin/codesign
          fi
          if [ -n "$MAC_INSTALLER_DIST_P12_BASE64" ]; then
            echo "$MAC_INSTALLER_DIST_P12_BASE64" | base64 --decode > inst.p12
            security import inst.p12 -k build.keychain -P "$MAC_INSTALLER_DIST_P12_PASSWORD" -T /usr/bin/productsign
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Build macOS PKG for App Store
        if: ${{ inputs.publish_app_store == true }}
        env:
          APP_VERSION_NAME: ${{ inputs.version_name }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.MAC_APP_DIST_IDENTITY }}
        run: |
          # Собираем PKG для App Store
          ./gradlew :composeApp:packagePkg -PmacOsAppStoreRelease=true --info

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/pkg/*.pkg

      - name: Upload PKG to App Store Connect
        if: ${{ inputs.publish_app_store == true }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          PKG_FILE=$(find composeApp/build/compose/binaries/main/pkg -name "*.pkg" | head -n 1)
          if [ -n "$PKG_FILE" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Uploading $PKG_FILE to App Store Connect..."
            xcrun altool --upload-app -f "$PKG_FILE" -t macos -u "$APPLE_ID" -p "@env:APPLE_APP_SPECIFIC_PASSWORD" --show-progress
          else
            echo "No PKG file or Apple App Specific Password found for upload!"
            exit 1
          fi
