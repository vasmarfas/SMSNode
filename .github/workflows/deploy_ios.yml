name: Deploy iOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      publish_app_store:
        description: 'Publish to Apple App Store'
        type: boolean
        default: false

jobs:
  build_and_deploy:
    name: Build iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install Apple Certificate and Provisioning Profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            echo -n "$IOS_P12_BASE64" | base64 --decode --output $CERTIFICATE_PATH
            echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode --output $PP_PATH
            security create-keychain -p "" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "" $KEYCHAIN_PATH
            security import $CERTIFICATE_PATH -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          fi

      - name: Build and Archive iOS App
        run: |
          cd iosApp
          xcodebuild -scheme iosApp \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="SMSNode AppStore Profile" \
            PRODUCT_BUNDLE_IDENTIFIER="com.vasmarfas.smsnode" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            MARKETING_VERSION="${{ inputs.version_name }}" \
            "OTHER_KKT_FLAGS=-Pcompose.ios.resources.targetArchs=arm64"

      - name: Export IPA
        run: |
          cd iosApp
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Upload to App Store Connect
        if: ${{ inputs.publish_app_store == true }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_FILE=$(find ${{ runner.temp }}/export -name "*.ipa" | head -n 1)
          if [ -n "$IPA_FILE" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Uploading $IPA_FILE to App Store Connect..."
            xcrun altool --upload-app -f "$IPA_FILE" -t ios -u "$APPLE_ID" -p "@env:APPLE_APP_SPECIFIC_PASSWORD"
          else
            echo "No IPA file or Apple App Specific Password found for upload!"
            exit 1
          fi
